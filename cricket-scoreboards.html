    <style>
        :root {
            --bg: #0d0d0d;
            --panel-outer: #111111;
            --panel-inner: #1a0a00;
            --panel-row: #150800;
            --orange: #e85d00;
            --orange-bright: #ff7a1a;
            --red: #c0200a;
            --red-bright: #e02a10;
            --white: #f0ece0;
            --off-white: #c8c0a8;
            --dim: #8a7060;
            --border-main: #e85d00;
            --border-inner: #5a2a00;
            --font-display: 'Sono', 'Courier New', monospace;
            --font-data: 'Oswald', 'Impact', sans-serif;
            --flip-bg-top: #1c0e00;
            --flip-bg-bot: #0e0600;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,100,0,0.015) 3px, rgba(255,100,0,0.015) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,100,0,0.015) 3px, rgba(255,100,0,0.015) 4px);
            font-family: var(--font-display);
            color: var(--white);
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* ── PAGE TITLE ─────────────────── */
        .page-title {
            text-align: center;
            font-family: var(--font-display);
            font-size: clamp(1.1rem, 3vw, 1.8rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--orange);
            text-shadow: 0 0 20px rgba(232,93,0,0.5);
            margin-bottom: 6px;
        }
        .page-subtitle {
            text-align: center;
            font-family: var(--font-data);
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* ── NAVIGATION ─────────────────── */
        .nav-strip {
            max-width: 900px;
            margin: 0 auto 24px;
            background: #0d0500;
            border: 1px solid var(--border-inner);
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }
        .nav-btn {
            font-family: var(--font-data);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--dim);
            background: transparent;
            border: 1px solid #2a1500;
            border-radius: 2px;
            padding: 5px 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
            min-width: 56px;
        }
        .nav-btn:hover { color: var(--orange-bright); border-color: var(--orange); background: rgba(232,93,0,0.1); }
        .nav-btn.active { color: var(--bg); background: var(--orange); border-color: var(--orange-bright); }
        .nav-btn.win { color: #44cc66; }
        .nav-btn.loss { color: var(--red); }

        /* ── SCOREBOARD WRAPPER ─────────── */
        .board-wrap {
            max-width: 900px;
            margin: 0 auto;
            background: var(--panel-outer);
            border: 3px solid var(--border-main);
            border-radius: 6px;
            box-shadow:
                0 0 0 1px #000,
                0 0 40px rgba(232,93,0,0.25),
                inset 0 1px 0 rgba(255,200,100,0.05);
            overflow: hidden;
        }

        /* ── HEADER ROW ─────────────────── */
        .board-header {
            background: linear-gradient(135deg, #1e0800 0%, #2a1200 50%, #1a0600 100%);
            border-bottom: 2px solid var(--orange);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .board-round {
            font-family: var(--font-data);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            color: var(--orange);
            text-transform: uppercase;
        }
        .board-date {
            font-family: var(--font-display);
            font-size: 0.85rem;
            color: var(--off-white);
            letter-spacing: 0.1em;
        }
        .board-venue {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--dim);
            letter-spacing: 0.05em;
            text-align: right;
            max-width: 400px;
        }

        /* ── SCORES SECTION ─────────────── */
        .scores-section {
            background: var(--panel-inner);
            padding: 28px 24px 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-inner);
        }
        .team-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .team-block.home { align-items: flex-start; }
        .team-block.away { align-items: flex-end; }

        .team-name {
            font-family: var(--font-display);
            font-size: clamp(0.85rem, 2vw, 1.05rem);
            letter-spacing: 0.05em;
            color: var(--white);
            text-transform: uppercase;
            line-height: 1.2;
        }
        .team-label {
            font-family: var(--font-data);
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            color: var(--dim);
            text-transform: uppercase;
        }

        /* FLIP SCORE DISPLAY */
        .score-display {
            display: flex;
            gap: 3px;
            font-size: 3.0rem;
            align-items: center;
        }
        .score-segment {
            display: flex;
            flex-direction: column;
            width: 42px;
            height: 60px;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #3a1800;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8), 0 0 6px rgba(232,93,0,0.1);
            position: relative;
        }
        .seg-top {
            flex: 1;
            background: #2e1300;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 1px;
            border-bottom: 1px solid #1a0800;
        }
        .seg-bot {
            flex: 1;
            background: #1e0d00;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 1px;
        }
        .seg-char {
            font-family: var(--font-data);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--orange-bright);
            line-height: 1;
            text-shadow: 0 0 8px rgba(255,122,26,0.6);
        }
        .score-sep {
            font-family: var(--font-data);
            font-size: 2.0rem;
            font-weight: 700;
            color: var(--red);
            padding: 0 1px;
            align-self: center;
            line-height: 1;
        }

        .vs-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .vs-text {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--red);
            letter-spacing: 0.1em;
        }
        .innings-label {
            font-family: var(--font-data);
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
        }

        /* ── RESULT BANNER ──────────────── */
        .result-banner {
            background: linear-gradient(90deg, var(--red) 0%, #8a1200 50%, var(--red) 100%);
            padding: 10px 24px;
            text-align: center;
            border-top: 1px solid #ff4422;
            border-bottom: 1px solid #660000;
        }
        .result-banner.win {
            background: linear-gradient(90deg, #1a4400 0%, #2a6600 50%, #1a4400 100%);
            border-top-color: #44cc66;
            border-bottom-color: #226633;
        }
        .result-text {
            font-family: var(--font-display);
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            letter-spacing: 0.12em;
            color: var(--white);
            text-transform: uppercase;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* ── INNINGS DETAILS ────────────── */
        .innings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border-inner);
        }
        .innings-panel {
            background: var(--panel-row);
            padding: 16px 20px;
        }
        .innings-header {
            font-family: var(--font-data);
            font-size: 1.0rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--orange);
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-inner);
        }
        .innings-team-name {
            font-family: var(--font-display);
            font-size: 1.0rem;
            color: var(--off-white);
            margin-bottom: 10px;
            letter-spacing: 0.04em;
        }
        .perf-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 7px;
        }
        .perf-label {
            font-family: var(--font-data);
            font-size: 1.0rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
            width: 46px;
            flex-shrink: 0;
            padding-top: 1px;
        }
        .perf-values {
            flex: 1;
        }
        .perf-entry {
            font-family: var(--font-display);
            font-size: 1.0rem;
            color: var(--white);
            letter-spacing: 0.04em;
            display: block;
            line-height: 1.5;
        }
        .perf-entry.bat { color: var(--orange-bright); }
        .perf-entry.bowl { color: #ff9999; }
        .perf-none {
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: #3a2a1a;
            font-style: italic;
        }

        /* ── FLIP ANIMATION ─────────────── */
        @keyframes flipIn {
            0%   { transform: rotateX(90deg); opacity: 0; }
            100% { transform: rotateX(0deg);  opacity: 1; }
        }
        .score-segment.animate .seg-top { animation: flipIn 0.4s cubic-bezier(0.23, 1, 0.32, 1) backwards; }
        .score-segment.animate .seg-bot { animation: flipIn 0.4s cubic-bezier(0.23, 1, 0.32, 1) 0.08s backwards; }

        /* ── DIVIDER ────────────────────── */
        .board-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--orange), transparent);
            opacity: 0.4;
            margin: 0;
        }

        /* ── NO DATA ────────────────────── */
        .no-data {
            font-family: var(--font-display);
            font-size: 0.72rem;
            color: #2a1a0a;
            font-style: italic;
        }

        /* ── STATIC NOISE TEXTURE ───────── */
        .board-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;

            background-size: 128px;
            opacity: 0.4;
            border-radius: 6px;
        }
        .board-wrap { position: relative; }
    </style>

    "Match date": "28/02/2026",
    "Round name": "Round 18",
    "Home team": "Brindabella Blacksnakes CC",
    "Home Team Score": "Feb-99",
    "Away team": "Cook XI CC",
    "Away Team Score": "98",
    "Result": "Brindabella Blacksnakes CC won by 8 wickets",
    "Venue": "Yarralumla Neighborhood Oval",
    "1st Innings Team": "Cook XI CC",
    "1st Innings Batting Performance": "",
    "1st Innings Bowling Performance": "M Snoke - 5-21",
    "2nd Innings Team": "Brindabella Blacksnakes CC",
    "2nd Innings Batting Performance": "M Janas-Price - 60",
    "2nd Innings Bowling Performance": ""
  }
];

    function isWin(result) {
        return result.toLowerCase().includes('brindabella blacksnakes');
    }

    function renderScore(scoreStr) {
        const raw = String(scoreStr).trim();
        const parts = raw.split('-');
        let wickets = null, runs = null;
        if (parts.length === 2) {
            wickets = parts[0];
            runs = parts[1];
        } else {
            runs = parts[0];
        }
        const runsStr = String(runs);
        if (wickets !== null) {
            return `<div class="score-main"><span class="score-wkts">${wickets}</span><span class="score-sep">/</span><span class="score-runs">${runsStr}</span></div>`;
        }
        return `<div class="score-main"><span class="score-runs">${runsStr}</span></div>`;
    }

    function splitEntries(val) {
        if (!val) return [];
        return val.split('|').map(s => s.trim()).filter(Boolean);
    }

    function renderPerf(label, val, cls) {
        const entries = splitEntries(val);
        if (!entries.length) return '';
        return `<div class="perf-row">
            <div class="perf-label">${label}</div>
            <div class="perf-values">
                ${entries.map(e => `<span class="perf-entry ${cls}">${e}</span>`).join('')}
            </div>
        </div>`;
    }

    function render(index) {
        const m = matches[index];
        const win = isWin(m['Result']);

        const html = `
        <div class="board-wrap">
            <div class="board-header">
                <div>
                    <div class="board-round">${m['Round name']}</div>
                    <div class="board-date">${m['Match date']}</div>
                </div>
                <div class="board-venue">${m['Venue']}</div>
            </div>

            <div class="scores-section">
                <div class="team-block home">
                    <div class="team-label">Home</div>
                    <div class="team-name">${m['Home team']}</div>
                    <div class="score-display">
                        ${renderScore(m['Home Team Score'])}
                    </div>
                </div>

                <div class="vs-block">
                    <div class="vs-text">vs</div>
                </div>

                <div class="team-block away">
                    <div class="team-label">Away</div>
                    <div class="team-name">${m['Away team']}</div>
                    <div class="score-display">
                        ${renderScore(m['Away Team Score'])}
                    </div>
                </div>
            </div>

            <div class="result-banner ${win ? 'win' : ''}">
                <div class="result-text">${m['Result']}</div>
            </div>

            <div class="board-divider"></div>

            <div class="innings-grid">
                <div class="innings-panel">
                    <div class="innings-header">&#9654; 1st Innings</div>
                    <div class="innings-team-name">${m['1st Innings Team'] || '&mdash;'}</div>
                    ${renderPerf('Bat', m['1st Innings Batting Performance'], 'bat')}
                    ${renderPerf('Bowl', m['1st Innings Bowling Performance'], 'bowl')}
                </div>
                <div class="innings-panel">
                    <div class="innings-header">&#9654; 2nd Innings</div>
                    <div class="innings-team-name">${m['2nd Innings Team'] || '&mdash;'}</div>
                    ${renderPerf('Bat', m['2nd Innings Batting Performance'], 'bat')}
                    ${renderPerf('Bowl', m['2nd Innings Bowling Performance'], 'bowl')}
                </div>
            </div>
        </div>`;

        document.getElementById('boardContainer').innerHTML = html;

    }

    function buildNav() {
        const strip = document.getElementById('navStrip');
        matches.forEach((m, i) => {
            const win = isWin(m['Result']);
            const btn = document.createElement('button');
            btn.className = 'nav-btn' + (win ? ' win' : ' loss');
            btn.textContent = m['Round name'].replace('Round ', 'R');
            btn.id = 'btn-' + i;
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentIndex = i;
                render(i);
            };
            strip.appendChild(btn);
        });
    }

    let currentIndex = 0;
    buildNav();
    document.getElementById('btn-0').classList.add('active');
    render(0);
    </script>
</body>
</html>
